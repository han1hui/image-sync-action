name: Docker Image Sync

on:
  push:
    paths:
      - 'images.json'
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  image-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_HUB_USERNAME }}
          password: ${{ secrets.ALIYUN_HUB_PASSWORD }}

      - name: Parse and Sync Images
        run: |
          # 使用 jq 读取 JSON，key 是源镜像，value 是目标镜像
          # -r 表示 raw 输出，去掉引号
          jq -r 'keys[]' images.json | while read -r source_image; do
            target_image=$(jq -r --arg key "$source_image" '.[$key]' images.json)
            
            if [ -z "$source_image" ] || [ -z "$target_image" ]; then
              continue
            fi
            
            echo "========================================="
            echo "🚀 正在同步: $source_image"
            echo "➡️  目标: $target_image"
            echo "========================================="
            
            # 拉取镜像
            docker pull "$source_image" || { echo "❌ 拉取失败: $source_image"; continue; }
            
            # 打标签
            docker tag "$source_image" "$target_image"
            
            # 推送
            docker push "$target_image" || { echo "❌ 推送失败: $target_image"; continue; }
            
            # 清理
            docker rmi "$source_image" "$target_image" || true
            
            echo "✅ 同步完成!"
            echo ""
          done
